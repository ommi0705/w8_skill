<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f15;
            --sidebar-bg: #141720;
            --chat-bg: #0d0f15;
            --primary: #5c6fff;
            --primary-hover: #4a5bd2;
            --text-main: #f0f0f5;
            --text-muted: #8b8f9e;
            --msg-user: #1f222d;
            --border-color: #262933;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .new-chat-btn {
            background: linear-gradient(135deg, var(--primary), #8134ff);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .new-chat-btn:hover { opacity: 0.9; transform: scale(0.98); }

        .session-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .session-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }
        
        .session-item:hover, .session-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            font-weight: bold;
        }

        .user-avatar { background-color: var(--primary); }
        .ai-avatar { background: linear-gradient(135deg, #10a37f, #0d8063); }

        .msg-content {
            flex: 1;
            color: var(--text-main);
        }
        
        .msg-image {
            max-width: 300px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }

        .message.user .msg-content-wrapper {
             background-color: var(--msg-user);
             padding: 12px 16px;
             border-radius: 12px;
             display: inline-block;
        }

        .input-wrapper {
            padding: 30px;
            background: linear-gradient(to top, var(--chat-bg) 70%, transparent);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--msg-user);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 15px;
            resize: none;
            outline: none;
            height: 24px;
            max-height: 150px;
            font-family: inherit;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-icon:hover { color: var(--text-main); background-color: rgba(255,255,255,0.1); }
        .send-btn { background-color: var(--primary); color: white; }
        .send-btn:hover { background-color: var(--primary-hover); }
        .stop-btn { background-color: #ff4a4a; color: white; display: none; }

        .file-preview {
            display: none;
            padding: 8px 16px;
            background: rgba(92, 111, 255, 0.1);
            color: var(--primary);
            border-radius: 6px 6px 0 0;
            font-size: 12px;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="new-chat-btn" onclick="createNewSession()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            建立新對話
        </button>
        <div class="session-list" id="sessionList"></div>
    </aside>

    <main class="chat-container">
        <div class="chat-messages" id="chatWindow">
            <div style="text-align: center; color: var(--text-muted); margin-top: 100px;">
                <h1>Antigravity AI</h1>
                <p style="margin-top: 10px;">您可以上傳文件或開始問答，我將記得您的每次對話歷史檔案。</p>
            </div>
        </div>
        
        <div class="file-preview" id="filePreview">已選擇檔案: <span id="fileName"></span> <button onclick="clearFile()" style="background:none; border:none; color:inherit; cursor:pointer; margin-left:10px;">✕</button></div>
        
        <div class="input-wrapper">
            <div class="input-box">
                <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="上傳檔案">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <textarea id="msgInput" placeholder="在此輸入訊息 (Enter 傳送，Shift+Enter 換行)" rows="1" onkeydown="handleEnter(event)" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button class="btn-icon send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
                <button class="btn-icon stop-btn" id="stopBtn" onclick="stopGeneration()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"></rect></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentSessionId = null;
        let uploadedFilePath = null;

        window.onload = async () => {
            await loadSessions();
        }

        async function loadSessions() {
            const res = await fetch('/api/sessions');
            const sessions = await res.json();
            const list = document.getElementById('sessionList');
            list.innerHTML = '';
            
            if(sessions.length === 0) {
                await createNewSession();
                return;
            }

            sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
                div.textContent = s.title;
                div.onclick = () => selectSession(s.id);
                list.appendChild(div);
            });
            
            if(!currentSessionId) {
                selectSession(sessions[0].id);
            }
        }

        async function createNewSession() {
            const res = await fetch('/api/sessions', { method: 'POST' });
            const s = await res.json();
            currentSessionId = s.id;
            await loadSessions();
            document.getElementById('chatWindow').innerHTML = `<div style="text-align: center; color: #8b8f9e; margin-top: 100px;"><h1>新對話</h1><p style="margin-top:10px;">有什麼我可以幫您的嗎？</p></div>`;
        }

        async function selectSession(id) {
            currentSessionId = id;
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            loadSessions(); // UI update trigger
            
            const res = await fetch(`/api/sessions/${id}/messages`);
            const msgs = await res.json();
            const chatBox = document.getElementById('chatWindow');
            chatBox.innerHTML = '';
            msgs.forEach(m => {
                appendMessage(m.role, m.content, m.media_path);
            });
            scrollToBottom();
        }

        function appendMessage(role, content, media_path=null, isStreaming=false) {
            const chatBox = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            const avatarClass = role === 'user' ? 'user-avatar' : 'ai-avatar';
            const avatar = role === 'user' ? '👤' : '🤖';
            
            let mediaHTML = '';
            if(media_path) {
                // If its an image display it or link
                mediaHTML = `<br><a href="${media_path}" target="_blank" style="color:var(--primary); font-size:12px;">附件: ${media_path}</a>`;
            }

            div.innerHTML = `
                <div class="avatar ${avatarClass}">${avatar}</div>
                <div class="msg-content">
                    <div class="msg-content-wrapper stream-target">${content}</div>
                    ${mediaHTML}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
            
            if(isStreaming) {
                return div.querySelector('.stream-target');
            }
        }
        
        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('filePreview').style.display = 'block';
            
            const formData = new FormData();
            formData.append("file", file);
            
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                uploadedFilePath = data.path;
            } catch(e) {
                alert("上傳失敗");
            }
        }
        
        function clearFile() {
            uploadedFilePath = null;
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        function handleEnter(e) {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text && !uploadedFilePath) return;

            appendMessage('user', text, uploadedFilePath);
            
            const reqBody = {
                session_id: currentSessionId,
                content: text,
                media_path: uploadedFilePath
            };

            input.value = '';
            input.style.height = '24px';
            clearFile();

            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';

            const targetDOM = appendMessage('assistant', '...', null, true);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reqBody)
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                targetDOM.innerHTML = '';
                
                while(true) {
                    const { done, value } = await reader.read();
                    if(done) break;
                    
                    const chunk = decoder.decode(value, {stream: true});
                    const lines = chunk.split('\n\n');
                    for(let line of lines) {
                        if(line.startsWith('data: ')) {
                            const data = line.replace('data: ', '');
                            if(data === '[DONE]') {
                                break;
                            }
                            targetDOM.innerHTML += data;
                            scrollToBottom();
                        }
                    }
                }
            } catch(e) {
                console.error(e);
            } finally {
                document.getElementById('sendBtn').style.display = 'flex';
                document.getElementById('stopBtn').style.display = 'none';
                loadSessions(); 
            }
        }
        
        async function stopGeneration() {
            if(!currentSessionId) return;
            await fetch(`/api/chat/stop/${currentSessionId}`, { method: 'POST' });
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatWindow');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
